<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoJo Stand Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #9a78ea;
  --bg: #f5e9d6;
  --glow: rgba(154, 120, 234, 0.35);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 35%),
    linear-gradient(180deg, #f8eedf 0%, var(--bg) 100%);
  text-align: center;
  color: #2f2a24;
  overflow-x: hidden;
}

h1 {
  font-family: "Playfair Display", serif;
  margin-top: 20px;
  margin-bottom: 6px;
  font-size: clamp(2rem, 4vw, 3.2rem);
  color: #4a433c;
  animation: fadeDown 0.8s ease;
}

.subtle-line {
  width: 120px;
  height: 2px;
  margin: 0 auto 12px;
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.2), transparent);
  animation: fadeIn 1.1s ease;
}

.hero {
  position: relative;
  min-height: 560px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 6px;
}

.aura {
  position: absolute;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--glow) 0%, rgba(255,255,255,0) 70%);
  filter: blur(22px);
  animation: pulseAura 2.6s ease-in-out infinite;
  pointer-events: none;
}

.image-wrap {
  position: relative;
  z-index: 2;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 430px;
  width: min(90vw, 720px);
}

.hero img {
  max-height: 440px;
  max-width: 90%;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 18px 28px rgba(0,0,0,0.18));
  transition: opacity 0.4s ease, transform 0.4s ease, filter 0.4s ease;
  animation: floatImage 3.4s ease-in-out infinite;
}

.hero img.switching {
  opacity: 0;
  transform: translateY(10px) scale(0.97);
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: clamp(4rem, 7vw, 6.5rem);
  cursor: pointer;
  color: rgba(80, 82, 88, 0.28);
  user-select: none;
  transition: transform 0.22s ease, color 0.22s ease, text-shadow 0.22s ease;
  z-index: 4;
  line-height: 1;
}

.arrow:hover {
  color: rgba(80, 82, 88, 0.55);
  transform: translateY(-50%) scale(1.08);
  text-shadow: 0 0 16px rgba(255,255,255,0.6);
}

.left { left: 20px; }
.right { right: 20px; }

.info-block {
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.info-block.switching {
  opacity: 0;
  transform: translateY(10px);
}

.stand-name {
  font-family: "Cormorant Garamond", serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  color: var(--accent);
  margin-top: -12px;
  line-height: 1.1;
  text-shadow: 0 0 18px rgba(255,255,255,0.3);
}

.user-name {
  font-family: "Cormorant Garamond", serif;
  font-size: clamp(1.9rem, 4vw, 3rem);
  color: var(--accent);
  margin-top: 6px;
  opacity: 0.9;
}

.favorite {
  margin-top: 12px;
  font-size: 26px;
  cursor: pointer;
  display: inline-flex;
  width: 52px;
  height: 52px;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.75);
  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  color: #5a5550;
}

.favorite:hover {
  transform: scale(1.08);
  box-shadow: 0 12px 28px rgba(0,0,0,0.12);
}

.favorite.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 25px var(--glow);
}

.counter {
  margin-top: 12px;
  font-size: 12px;
  letter-spacing: 5px;
  color: #66605a;
}

.details {
  margin: 42px auto 50px;
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
  width: min(100%, 940px);
}

.card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(8px);
  padding: 22px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 16px 35px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.65);
  text-align: left;
  transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.35s ease;
  animation: fadeUp 0.9s ease;
}

.card.switching {
  opacity: 0;
  transform: translateY(12px);
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.11);
}

.card h3 {
  margin-top: 0;
  margin-bottom: 14px;
  font-family: "Playfair Display", serif;
  font-size: 1.4rem;
  color: #4c443d;
}

.label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #8a8179;
  margin-top: 12px;
  margin-bottom: 6px;
}

.card p {
  margin: 0 0 12px;
  line-height: 1.7;
}

@keyframes pulseAura {
  0%, 100% { transform: scale(1); opacity: 0.85; }
  50% { transform: scale(1.08); opacity: 1; }
}

@keyframes floatImage {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-14px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@media (max-width: 768px) {
  .hero {
    min-height: 480px;
  }

  .hero img {
    max-height: 320px;
  }

  .aura {
    width: 260px;
    height: 260px;
  }

  .left { left: 10px; }
  .right { right: 10px; }

  .details {
    margin-top: 26px;
    gap: 16px;
  }

  .card {
    width: min(92vw, 360px);
  }
}
</style>
</head>

<body>

<h1>JoJo Stand Viewer</h1>
<div class="subtle-line"></div>

<div class="hero">
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="aura" id="aura"></div>
  <div class="image-wrap">
    <img id="image" alt="Stand image">
  </div>
  <div class="arrow right" onclick="next()">›</div>
</div>

<div class="info-block" id="topInfo">
  <div class="stand-name" id="standName"></div>
  <div class="user-name" id="userName"></div>

  <div class="favorite" id="favoriteBtn" onclick="favorite()">♥</div>
  <div class="counter" id="counter"></div>
</div>

<div class="details">
  <div class="card" id="standCard">
    <h3>Stand</h3>
    <div class="label">Ability</div>
    <p id="ability"></p>
    <div class="label">Description</div>
    <p id="description"></p>
  </div>

  <div class="card" id="userCard">
    <h3>User</h3>
    <div class="label">Bio</div>
    <p id="bio"></p>
    <div class="label">Part</div>
    <p id="part"></p>
  </div>
</div>

<script>
const stands = [
  {
    name: "Star Platinum",
    user: "Jotaro Kujo",
    accent: "#9a78ea",
    glow: "rgba(154, 120, 234, 0.35)",
    ability: "Super speed, precision, immense strength, and time stop.",
    description: "A close-range Stand with overwhelming power.",
    bio: "A stoic and intimidating student.",
    part: "Part 3",
    image: "star-platinum.png"
  },
  {
    name: "The World",
    user: "DIO",
    accent: "#d2a316",
    glow: "rgba(210, 163, 22, 0.36)",
    ability: "Time stop and immense strength.",
    description: "A terrifying Stand.",
    bio: "A ruthless villain.",
    part: "Part 3",
    image: "the-world-new.png"
  },
  {
    name: "Crazy Diamond",
    user: "Josuke Higashikata",
    accent: "#ff5ba2",
    glow: "rgba(255, 91, 162, 0.32)",
    ability: "Restores objects and heals.",
    description: "A powerful restoration Stand.",
    bio: "Kind but fierce.",
    part: "Part 4",
    image: "crazy-diamond.png"
  }
];

let i = 0;
const favorites = new Set();

const imageEl = document.getElementById("image");
const standNameEl = document.getElementById("standName");
const userNameEl = document.getElementById("userName");
const abilityEl = document.getElementById("ability");
const descriptionEl = document.getElementById("description");
const bioEl = document.getElementById("bio");
const partEl = document.getElementById("part");
const counterEl = document.getElementById("counter");
const favoriteBtn = document.getElementById("favoriteBtn");
const auraEl = document.getElementById("aura");
const topInfoEl = document.getElementById("topInfo");
const standCardEl = document.getElementById("standCard");
const userCardEl = document.getElementById("userCard");

function applyContent(s) {
  document.documentElement.style.setProperty("--accent", s.accent);
  document.documentElement.style.setProperty("--glow", s.glow);
  auraEl.style.background = `radial-gradient(circle, ${s.glow} 0%, rgba(255,255,255,0) 70%)`;

  imageEl.src = s.image;
  standNameEl.textContent = s.name;
  userNameEl.textContent = s.user;
  abilityEl.textContent = s.ability;
  descriptionEl.textContent = s.description;
  bioEl.textContent = s.bio;
  partEl.textContent = s.part;
  counterEl.textContent =
    (i + 1).toString().padStart(2, "0") + " / " + stands.length.toString().padStart(2, "0");

  favoriteBtn.classList.toggle("active", favorites.has(s.name));
}

function transitionTo(newIndex) {
  imageEl.classList.add("switching");
  topInfoEl.classList.add("switching");
  standCardEl.classList.add("switching");
  userCardEl.classList.add("switching");

  setTimeout(() => {
    i = newIndex;
    applyContent(stands[i]);

    imageEl.classList.remove("switching");
    topInfoEl.classList.remove("switching");
    standCardEl.classList.remove("switching");
    userCardEl.classList.remove("switching");
  }, 220);
}

function update() {
  applyContent(stands[i]);
}

function next() {
  const nextIndex = (i + 1) % stands.length;
  transitionTo(nextIndex);
}

function prev() {
  const prevIndex = (i - 1 + stands.length) % stands.length;
  transitionTo(prevIndex);
}

function favorite() {
  const current = stands[i].name;
  if (favorites.has(current)) {
    favorites.delete(current);
  } else {
    favorites.add(current);
  }
  favoriteBtn.classList.toggle("active", favorites.has(current));
}

update();
</script>

</body>
</html>
