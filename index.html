<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoJo Stand Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #9a78ea;
  --bg: #f5e9d6;
  --glow: rgba(154, 120, 234, 0.35);
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 35%),
    linear-gradient(180deg, #f8eedf 0%, var(--bg) 100%);
  text-align: center;
}

h1 {
  font-family: "Playfair Display", serif;
  margin-top: 20px;
}

.hero {
  position: relative;
  height: 560px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.aura {
  position: absolute;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  filter: blur(25px);
  animation: pulse 2.5s infinite;
}

.hero img {
  max-height: 440px;
  transition: 0.4s;
  animation: float 3s infinite ease-in-out;
}

.hero img.big {
  max-height: 560px;
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 80px;
  cursor: pointer;
  color: rgba(0,0,0,0.3);
}

.left { left: 20px; }
.right { right: 20px; }

.stand-name {
  font-family: "Cormorant Garamond";
  font-size: 40px;
  color: var(--accent);
}

.user-name {
  font-family: "Cormorant Garamond";
  font-size: 28px;
  color: var(--accent);
}

.favorite {
  font-size: 26px;
  cursor: pointer;
}

.favorite.active {
  color: red;
}

.details {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  text-align: left;
  line-height: 1.6;
}

.card h3 {
  margin-top: 0;
  text-align: center;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: .7; }
  50% { transform: scale(1.1); opacity: 1; }
}
</style>
</head>

<body>

<h1>JoJo Stand Viewer</h1>

<div class="hero">
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="aura" id="aura"></div>
  <img id="image" alt="Stand image">
  <div class="arrow right" onclick="next()">›</div>
</div>

<div class="stand-name" id="standName"></div>
<div class="user-name" id="userName"></div>

<div class="favorite" id="fav" onclick="favorite()">♥</div>

<div class="details">
  <div class="card">
    <h3>Stand</h3>
    <p><strong>Ability:</strong> <span id="ability"></span></p>
    <p id="description"></p>
  </div>

  <div class="card">
    <h3>User</h3>
    <p id="bio"></p>
    <p><strong>Part:</strong> <span id="part"></span></p>
  </div>
</div>

<script>
const stands = [
  {
    name: "Star Platinum",
    user: "Jotaro Kujo",
    accent: "#9a78ea",
    glow: "rgba(154,120,234,0.4)",
    ability: "Super speed, precision, immense strength, and time stop.",
    description: "Star Platinum is one of the most powerful close-range Stands, known for its incredible speed, strength, and precision. It can move faster than the eye can track and deliver devastating punches with pinpoint accuracy. One of its defining traits is its extremely sharp eyesight, allowing it to see tiny details from long distances. As the series progresses, Star Platinum gains the ability to stop time for a few seconds, making it even more dangerous in combat. Its durability and reflexes make it nearly unbeatable in close quarters. Overall, it represents raw power combined with perfect control.",
    bio: "Jotaro Kujo is a calm, intelligent, and highly disciplined high school student who often appears cold and detached. Despite his tough exterior, he deeply cares about his family and friends and is willing to risk everything to protect them. He is extremely observant and strategic, often outsmarting enemies rather than relying solely on brute force. Jotaro has a strong sense of justice and rarely shows fear, even in life-threatening situations. His personality contrasts with his immense power, making him both intimidating and reliable. He plays a central role in Part 3: Stardust Crusaders as the main protagonist.",
    part: "Part 3",
    image: "star-platinum.png"
  },
  {
    name: "The World",
    user: "DIO",
    accent: "#d2a316",
    glow: "rgba(210,163,22,0.5)",
    ability: "Time stop, immense strength, and incredible speed.",
    description: "The World is a close-range Stand that rivals Star Platinum in strength, speed, and precision. Its most iconic ability is the power to stop time, allowing DIO to move freely while everything else remains frozen. During stopped time, The World can attack opponents without them being able to react, making it extremely lethal. It also possesses immense physical power, capable of destroying enemies with ease. Its speed allows it to keep up with even the fastest Stands in battle. Combined with DIO’s intelligence and ruthlessness, The World becomes one of the most dangerous Stands in the series.",
    bio: "DIO is a charismatic and ruthless antagonist driven by his desire for absolute power and dominance. Originally born as Dio Brando, he uses cunning, manipulation, and ambition to rise above others at any cost. After becoming a vampire, he gains enhanced strength, regeneration, and immortality, further amplifying his threat. DIO is highly intelligent and strategic, often planning several steps ahead of his enemies. He views others as tools or obstacles, showing little to no empathy. As the main villain of Part 3: Stardust Crusaders, he stands as one of the most iconic and feared characters in the series.",
    part: "Part 3",
    image: "the-world-new.png"
  },
  {
    name: "Crazy Diamond",
    user: "Josuke Higashikata",
    accent: "#ff5ba2",
    glow: "rgba(255,91,162,0.4)",
    ability: "Restoration, healing, and powerful close-range attacks.",
    description: "Crazy Diamond is a close-range Stand with incredible strength and speed, comparable to Star Platinum. Its unique ability allows it to restore objects or living beings back to a previous state, effectively healing injuries or repairing damage. This restoration power can also be used creatively in combat, such as reshaping objects or trapping enemies. However, it cannot heal Josuke himself, which is its main limitation. The Stand’s precision and speed make it highly effective both offensively and defensively. It represents both power and compassion through its restorative abilities.",
    bio: "Josuke Higashikata is a kind-hearted and friendly high school student known for his strong sense of empathy. He deeply values his friends and community and often uses his Stand to help others. Despite his calm nature, he has a short temper when someone insults his hairstyle. Josuke is brave and willing to stand up against dangerous enemies to protect those around him. He balances humor and seriousness, making him a relatable and likable protagonist. He is the main character of Part 4: Diamond is Unbreakable.",
    part: "Part 4",
    image: "crazy-diamond.png"
  }
];

let i = 0;
let favs = new Set();

function update() {
  let s = stands[i];

  document.documentElement.style.setProperty("--accent", s.accent);
  document.getElementById("aura").style.background = s.glow;

  let img = document.getElementById("image");
  img.src = s.image;

  if (s.name === "The World") {
    img.classList.add("big");
  } else {
    img.classList.remove("big");
  }

  document.getElementById("standName").textContent = s.name;
  document.getElementById("userName").textContent = s.user;
  document.getElementById("ability").textContent = s.ability;
  document.getElementById("description").textContent = s.description;
  document.getElementById("bio").textContent = s.bio;
  document.getElementById("part").textContent = s.part;
}

function next() {
  i = (i + 1) % stands.length;
  update();
}

function prev() {
  i = (i - 1 + stands.length) % stands.length;
  update();
}

function favorite() {
  let name = stands[i].name;
  let btn = document.getElementById("fav");

  if (favs.has(name)) {
    favs.delete(name);
    btn.classList.remove("active");
  } else {
    favs.add(name);
    btn.classList.add("active");
  }
}

update();
</script>

</body>
</html>
