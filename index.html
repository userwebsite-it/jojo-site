<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoJo Stand Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #9a78ea;
  --bg: #f5e9d6;
  --glow: rgba(154, 120, 234, 0.35);
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 35%),
    linear-gradient(180deg, #f8eedf 0%, var(--bg) 100%);
  text-align: center;
}

h1 {
  font-family: "Playfair Display", serif;
  margin-top: 20px;
}

.hero {
  position: relative;
  height: 560px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.aura {
  position: absolute;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  filter: blur(25px);
  animation: pulse 2.5s infinite;
}

.hero img {
  max-height: 440px;
  transition: 0.4s;
  animation: float 3s infinite ease-in-out;
}

/* ✅ FIXED BIGGER DIO */
.hero img.big {
  max-height: 560px;
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 80px;
  cursor: pointer;
  color: rgba(0,0,0,0.3);
}

.left { left: 20px; }
.right { right: 20px; }

.stand-name {
  font-family: "Cormorant Garamond";
  font-size: 40px;
  color: var(--accent);
}

.user-name {
  font-family: "Cormorant Garamond";
  font-size: 28px;
  color: var(--accent);
}

.favorite {
  font-size: 26px;
  cursor: pointer;
}

.favorite.active {
  color: red;
}

.details {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
}

/* Animations */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: .7; }
  50% { transform: scale(1.1); opacity: 1; }
}
</style>
</head>

<body>

<h1>JoJo Stand Viewer</h1>

<div class="hero">
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="aura" id="aura"></div>
  <img id="image">
  <div class="arrow right" onclick="next()">›</div>
</div>

<div class="stand-name" id="standName"></div>
<div class="user-name" id="userName"></div>

<div class="favorite" id="fav" onclick="favorite()">♥</div>

<div class="details">
  <div class="card">
    <h3>Stand</h3>
    <p id="ability"></p>
    <p id="description"></p>
  </div>

  <div class="card">
    <h3>User</h3>
    <p id="bio"></p>
    <p id="part"></p>
  </div>
</div>

<script>
const stands = [
  {
    name: "Star Platinum",
    user: "Jotaro Kujo",
    accent: "#9a78ea",
    glow: "rgba(154,120,234,0.4)",
    ability: "Super speed, strength, time stop",
    description: "Extremely powerful close-range Stand",
    bio: "Calm, intelligent, intimidating",
    part: "Part 3",
    image: "star-platinum.png"
  },
  {
    name: "The World",
    user: "DIO",
    accent: "#d2a316",
    glow: "rgba(210,163,22,0.5)",
    ability: "Time stop",
    description: "One of the strongest Stands",
    bio: "Charismatic and ruthless villain",
    part: "Part 3",
    image: "the-world-new.png"
  },
  {
    name: "Crazy Diamond",
    user: "Josuke",
    accent: "#ff5ba2",
    glow: "rgba(255,91,162,0.4)",
    ability: "Restoration",
    description: "Can heal and repair anything",
    bio: "Kind but short-tempered",
    part: "Part 4",
    image: "crazy-diamond.png"
  }
];

let i = 0;
let favs = new Set();

function update() {
  let s = stands[i];

  document.documentElement.style.setProperty("--accent", s.accent);
  document.getElementById("aura").style.background = s.glow;

  let img = document.getElementById("image");
  img.src = s.image;

  // ✅ BIGGER ONLY FOR DIO
  if (s.name === "The World") {
    img.classList.add("big");
  } else {
    img.classList.remove("big");
  }

  document.getElementById("standName").textContent = s.name;
  document.getElementById("userName").textContent = s.user;
  document.getElementById("ability").textContent = s.ability;
  document.getElementById("description").textContent = s.description;
  document.getElementById("bio").textContent = s.bio;
  document.getElementById("part").textContent = s.part;
}

function next() {
  i = (i + 1) % stands.length;
  update();
}

function prev() {
  i = (i - 1 + stands.length) % stands.length;
  update();
}

function favorite() {
  let name = stands[i].name;
  let btn = document.getElementById("fav");

  if (favs.has(name)) {
    favs.delete(name);
    btn.classList.remove("active");
  } else {
    favs.add(name);
    btn.classList.add("active");
  }
}

update();
</script>

</body>
</html>
